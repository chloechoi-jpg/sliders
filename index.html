<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Slider Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0e0e1e;
  font-family:'Press Start 2P',monospace;
  min-height:100vh;
  padding:56px 40px 100px;
  display:flex;flex-direction:column;align-items:center;
  image-rendering:pixelated;
}
h1{font-size:10px;letter-spacing:.12em;color:#f8c040;margin-bottom:60px;text-shadow:2px 2px 0 #a07010;}
.row{display:flex;gap:48px;align-items:flex-start;margin-bottom:64px;flex-wrap:wrap;justify-content:center;}
.sw{display:flex;flex-direction:column;align-items:center;}
.lbl{font-size:6px;letter-spacing:.1em;color:#8890a0;margin-bottom:24px;}

/* pixel bar track */
.pbar{position:relative;cursor:crosshair;user-select:none;image-rendering:pixelated;}
/* thick pixel border around tracks */
.pbar-outer{position:absolute;inset:-3px;border:3px solid #444860;image-rendering:pixelated;}
.pbar-inner{position:absolute;inset:0;background:#0a0a18;}
.pbar-fill{height:100%;image-rendering:pixelated;}

/* percentage label */
.pct{position:absolute;bottom:-22px;font-size:6px;color:#6870a0;transform:translateX(-50%);pointer-events:none;white-space:nowrap;}

/* scene containers */
.scene{position:relative;cursor:crosshair;user-select:none;image-rendering:pixelated;border:3px solid #444860;overflow:visible;}
.scene-inner{position:absolute;inset:0;overflow:hidden;}

/* vertical scene */
.vscene{position:relative;cursor:crosshair;user-select:none;image-rendering:pixelated;border:3px solid #444860;}

/* pixel shimmer on fills */
@keyframes pxShimmer{0%{opacity:.4}50%{opacity:1}100%{opacity:.4}}
/* pixel particle float */
@keyframes pxFloat{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-36px);opacity:0}}
/* pixel rain */
@keyframes pxRain{0%{transform:translateY(-8px);opacity:1}100%{transform:translateY(80px);opacity:0}}
/* pixel snow */
@keyframes pxSnow{0%{transform:translate(0,-4px);opacity:1}100%{transform:translate(4px,56px);opacity:0}}
/* zzz */
@keyframes pxZzz{0%{transform:translate(0,0);opacity:1}100%{transform:translate(8px,-24px);opacity:0}}
/* blink */
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
/* ember pixel */
@keyframes pxEmber{0%{transform:translate(0,0);opacity:1}100%{transform:translate(var(--ex),var(--ey));opacity:0}}
/* twinkle pixel */
@keyframes pxTwinkle{0%,100%{opacity:0}50%{opacity:1}}
/* rocket exhaust */
@keyframes pxExhaust{0%{transform:translateY(0);opacity:.9}100%{transform:translateY(16px);opacity:0}}
/* wing */
@keyframes pxWing{0%,100%{transform:scaleX(1)}50%{transform:scaleX(-1)}}
/* pixel bounce */
@keyframes pxBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
/* flash */
@keyframes pxFlash{0%,100%{opacity:0}10%,15%{opacity:1}12%{opacity:.3}}

/* bg pixel drift */
@keyframes bgDrift{0%{transform:translate(0,0)}100%{transform:translate(-64px,-64px)}}
@keyframes bgPulse{0%,100%{opacity:.032}50%{opacity:.055}}
@keyframes bgStarFloat{0%{transform:translateY(0);opacity:.4}50%{opacity:.7}100%{transform:translateY(-12px);opacity:.4}}

/* page background */
body{
  background:#0e0e1e;
  position:relative;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background-image:
    linear-gradient(rgba(80,100,200,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(80,100,200,.06) 1px,transparent 1px);
  background-size:32px 32px;
  animation:bgDrift 18s linear infinite, bgPulse 6s ease-in-out infinite;
  image-rendering:pixelated;
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background-image:
    linear-gradient(rgba(140,80,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(140,80,255,.04) 1px,transparent 1px);
  background-size:8px 8px;
  opacity:.6;
}
h1, .row, .sw, .lbl, [style*="PRESS DRAG"]{position:relative;z-index:1;}
#bgCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55;}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<h1>★ PIXEL SLIDER LAB ★</h1>

<!-- ══ ROW 1: Snail + Duck ══ -->
<div class="row">

<!-- SNAIL -->
<div class="sw">

<div class="pbar" id="snailTrack" style="width:440px;height:16px;margin-top:72px">
  <div style="position:absolute;inset:-3px;border:3px solid #444860"></div>
  <div style="position:absolute;inset:0;background:#0a0a18"></div>
  <div style="position:absolute;inset:0;overflow:hidden">
    <div id="snailFill" style="width:0%;height:100%;background:linear-gradient(90deg,#4a8c5c 0%,#4a8c5c 50%,#5aac6c 50%,#5aac6c 100%);background-size:8px 100%"></div>
  </div>
  <canvas id="slimeCanvas" style="position:absolute;top:-56px;left:0;pointer-events:none;image-rendering:pixelated" height="72"></canvas>
  <!-- pixel snail SVG -->
  <svg id="snailChar" style="position:absolute;top:-68px;pointer-events:none;image-rendering:pixelated;overflow:visible" width="64" height="56" viewBox="0 0 16 14">
    <!-- shell -->
    <rect x="5" y="0" width="10" height="9" fill="#6060a0"/>
    <rect x="6" y="1" width="8" height="7" fill="#7070b8"/>
    <rect x="7" y="2" width="6" height="5" fill="#5050a0"/>
    <rect x="8" y="3" width="4" height="3" fill="#4040a8"/>
    <rect x="9" y="4" width="2" height="1" fill="#3030a8"/>
    <!-- shell highlight -->
    <rect x="6" y="1" width="2" height="2" fill="#a0a0d8"/>
    <!-- body -->
    <rect x="0" y="7" width="12" height="4" fill="#70b080"/>
    <rect x="1" y="6" width="4" height="2" fill="#70b080"/>
    <!-- head -->
    <rect x="0" y="7" width="4" height="4" fill="#80c090"/>
    <!-- eye stalks -->
    <rect x="1" y="4" width="1" height="3" fill="#80c090"/>
    <rect x="3" y="4" width="1" height="3" fill="#80c090"/>
    <!-- eyes -->
    <rect x="1" y="3" width="2" height="2" fill="#f8f8f8"/>
    <rect x="3" y="3" width="2" height="2" fill="#f8f8f8"/>
    <rect x="1" y="4" width="1" height="1" fill="#202030"/>
    <rect x="3" y="4" width="1" height="1" fill="#202030"/>
    <!-- smile -->
    <rect x="1" y="10" width="1" height="1" fill="#508060"/>
    <rect x="2" y="11" width="2" height="1" fill="#508060"/>
    <!-- foot -->
    <rect x="0" y="11" width="13" height="2" fill="#60a070"/>
    <rect x="1" y="13" width="11" height="1" fill="#50906a"/>
  </svg>
  <div class="pct" id="snailPct" style="left:0%">0%</div>
</div>
</div>

<!-- DUCK -->
<div class="sw">

<div class="pbar" id="duckTrack" style="width:440px;height:16px;margin-top:54px">
  <div style="position:absolute;inset:-3px;border:3px solid #444860"></div>
  <div style="position:absolute;inset:0;background:#0a0a18"></div>
  <div style="position:absolute;inset:0;overflow:hidden">
    <div id="duckFill" style="width:0%;height:100%;background:linear-gradient(90deg,#3898b8 0%,#3898b8 50%,#48a8c8 50%,#48a8c8 100%);background-size:8px 100%"></div>
  </div>
  <div id="duckBubbles" style="position:absolute;bottom:16px;left:0;right:0;height:52px;pointer-events:none;overflow:visible"></div>
  <svg id="duckChar" style="position:absolute;top:-54px;pointer-events:none;image-rendering:pixelated;overflow:visible" width="56" height="44" viewBox="0 0 14 11">
    <!-- body -->
    <rect x="2" y="4" width="10" height="5" fill="#f0c820"/>
    <rect x="3" y="3" width="8" height="2" fill="#f0c820"/>
    <!-- wing shade -->
    <rect x="3" y="6" width="6" height="2" fill="#d8b010"/>
    <!-- head -->
    <rect x="0" y="1" width="5" height="5" fill="#f0c820"/>
    <rect x="1" y="0" width="3" height="2" fill="#f0c820"/>
    <!-- beak -->
    <rect x="0" y="3" width="2" height="2" fill="#e85820"/>
    <rect x="0" y="4" width="2" height="1" fill="#c84010"/>
    <!-- eye -->
    <rect x="2" y="1" width="2" height="2" fill="#f8f8f8"/>
    <rect x="2" y="2" width="1" height="1" fill="#101018"/>
    <!-- water ripple below -->
    <rect x="1" y="10" width="12" height="1" fill="#3898b8" opacity=".5"/>
  </svg>
  <div class="pct" id="duckPct" style="left:0%">0%</div>
</div>
</div>
</div>

<!-- ══ ROW 2: Domino ══ -->
<div class="row" style="margin-bottom:64px">
<div class="sw">

<div class="pbar" id="dominoTrack" style="width:460px;height:16px;margin-top:60px">
  <div style="position:absolute;inset:-3px;border:3px solid #444860"></div>
  <div style="position:absolute;inset:0;background:#0a0a18"></div>
  <div style="position:absolute;inset:0;overflow:hidden">
    <div id="dominoFill" style="width:0%;height:100%;background:linear-gradient(90deg,#806040 0%,#806040 50%,#907050 50%,#907050 100%);background-size:8px 100%"></div>
  </div>
  <svg id="dominoSvg" style="position:absolute;top:-52px;left:0;pointer-events:none;image-rendering:pixelated;overflow:visible" height="64"></svg>
  <div class="pct" id="dominoPct" style="left:0%">0%</div>
</div>
</div>
</div>

<!-- ══ ROW 3: Campfire + Tide ══ -->
<div class="row">

<!-- CAMPFIRE -->
<div class="sw">

<div class="scene" id="fireScene" style="width:440px;height:100px">
  <div class="scene-inner" id="fireBg" style="background:#0a0818">
    <!-- pixel night sky tiles -->
    <div id="fireStarLayer" style="position:absolute;inset:0;pointer-events:none"></div>
    <!-- pixel ground -->
    <div style="position:absolute;bottom:0;left:0;right:0;height:24px;background:#3a2810;image-rendering:pixelated">
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:#5a3c18"></div>
    </div>
    <!-- logs pixel -->
    <svg id="fireLogs" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);image-rendering:pixelated;pointer-events:none" width="48" height="16" viewBox="0 0 12 4">
      <rect x="0" y="2" width="12" height="2" fill="#6a3c14"/>
      <rect x="1" y="1" width="3" height="2" fill="#7a4c1e" transform="rotate(-20,2,2)"/>
      <rect x="8" y="1" width="3" height="2" fill="#7a4c1e" transform="rotate(20,10,2)"/>
      <rect x="5" y="0" width="2" height="2" fill="#5a2c0a"/>
    </svg>
    <!-- pixel flame -->
    <svg id="flameSvg" style="position:absolute;bottom:32px;left:50%;transform:translateX(-50%);image-rendering:pixelated;pointer-events:none;overflow:visible" width="48" height="48" viewBox="0 0 12 12">
      <!-- outer flame orange -->
      <rect id="fo1" x="4" y="0" width="4" height="2" fill="#f08020"/>
      <rect id="fo2" x="2" y="2" width="8" height="2" fill="#f08020"/>
      <rect id="fo3" x="1" y="4" width="10" height="2" fill="#f08020"/>
      <rect id="fo4" x="2" y="6" width="8" height="2" fill="#f09030"/>
      <rect id="fo5" x="3" y="8" width="6" height="2" fill="#e07018"/>
      <rect id="fo6" x="4" y="10" width="4" height="2" fill="#c05010"/>
      <!-- mid flame yellow -->
      <rect x="4" y="1" width="4" height="2" fill="#f8d030"/>
      <rect x="3" y="3" width="6" height="2" fill="#f8d030"/>
      <rect x="4" y="5" width="4" height="3" fill="#f8d030"/>
      <!-- inner white -->
      <rect x="5" y="3" width="2" height="3" fill="#fff8d0"/>
    </svg>
    <!-- embers layer -->
    <div id="embersLayer" style="position:absolute;inset:0;pointer-events:none;overflow:visible"></div>
    <!-- smoke layer -->
    <div id="smokeLayer" style="position:absolute;inset:0;pointer-events:none;overflow:visible"></div>
  </div>
  <!-- bar -->
  <div style="position:absolute;bottom:8px;left:16px;right:16px;height:8px;z-index:10">
    <div style="position:absolute;inset:-2px;border:2px solid #444860"></div>
    <div style="position:absolute;inset:0;background:#0a0a18"></div>
    <div style="position:absolute;inset:0;overflow:hidden">
      <div id="fireFill" style="width:0%;height:100%;background:linear-gradient(90deg,#e06010 0%,#e06010 50%,#f07020 50%,#f07020 100%);background-size:8px 100%"></div>
    </div>
    <div class="pct" id="firePct" style="left:0%">0%</div>
  </div>
</div>
</div>

<!-- TIDE / CRAB -->
<div class="sw">

<div class="scene" id="tideScene" style="width:440px;height:100px">
  <div class="scene-inner" id="tideBg" style="background:#4888c8">
    <!-- pixel sky clouds -->
    <svg id="tideCloud" style="position:absolute;top:6px;left:14%;pointer-events:none;image-rendering:pixelated" width="56" height="16" viewBox="0 0 14 4">
      <rect x="2" y="1" width="10" height="3" fill="rgba(255,255,255,.85)"/>
      <rect x="1" y="2" width="12" height="2" fill="rgba(255,255,255,.85)"/>
      <rect x="3" y="0" width="6" height="2" fill="rgba(255,255,255,.85)"/>
    </svg>
    <!-- pixel sun -->
    <svg style="position:absolute;top:8px;right:14px;pointer-events:none;image-rendering:pixelated" width="24" height="24" viewBox="0 0 6 6">
      <rect x="2" y="0" width="2" height="1" fill="#f8d040"/>
      <rect x="0" y="2" width="1" height="2" fill="#f8d040"/>
      <rect x="5" y="2" width="1" height="2" fill="#f8d040"/>
      <rect x="2" y="5" width="2" height="1" fill="#f8d040"/>
      <rect x="1" y="1" width="4" height="4" fill="#f8d040"/>
      <rect x="2" y="2" width="2" height="2" fill="#fff8a0"/>
    </svg>
    <!-- sand at bottom -->
    <div id="tideSand" style="position:absolute;bottom:0;left:0;right:0;height:30px;background:#c8a060;image-rendering:pixelated">
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:#d8b070"></div>
    </div>
    <!-- pixel water (rises) -->
    <div id="tideWater" style="position:absolute;bottom:0;left:0;right:0;height:8px;background:#2880d0;image-rendering:pixelated;overflow:hidden">
      <div id="tideWaterTop" style="position:absolute;top:0;left:0;right:0;height:4px;background:#40a0e8"></div>
      <!-- wave shimmer pixels -->
      <div style="position:absolute;top:0;left:0;right:0;height:4px;display:flex;gap:8px;padding:0 4px">
        <div style="width:8px;height:4px;background:rgba(255,255,255,.3)"></div>
        <div style="width:4px;height:4px;background:rgba(255,255,255,.2)"></div>
        <div style="width:8px;height:4px;background:rgba(255,255,255,.3)"></div>
        <div style="width:4px;height:4px;background:rgba(255,255,255,.2)"></div>
      </div>
    </div>
    <!-- pixel crab -->
    <svg id="crabChar" style="position:absolute;bottom:26px;image-rendering:pixelated;pointer-events:none;overflow:visible" width="40" height="28" viewBox="0 0 10 7">
      <!-- claws -->
      <rect x="0" y="1" width="2" height="2" fill="#d04828"/>
      <rect x="8" y="1" width="2" height="2" fill="#d04828"/>
      <!-- legs -->
      <rect x="1" y="3" width="1" height="2" fill="#c03820"/>
      <rect x="2" y="4" width="1" height="2" fill="#c03820"/>
      <rect x="7" y="3" width="1" height="2" fill="#c03820"/>
      <rect x="6" y="4" width="1" height="2" fill="#c03820"/>
      <!-- body -->
      <rect x="2" y="1" width="6" height="4" fill="#e05030"/>
      <rect x="3" y="0" width="4" height="2" fill="#e05030"/>
      <!-- shell texture -->
      <rect x="3" y="1" width="4" height="2" fill="#e86040" opacity=".6"/>
      <!-- eyes -->
      <rect x="3" y="0" width="1" height="1" fill="#f8f8f8"/>
      <rect x="6" y="0" width="1" height="1" fill="#f8f8f8"/>
      <rect x="3" y="0" width="1" height="1" fill="#181828" opacity=".7"/>
      <rect x="6" y="0" width="1" height="1" fill="#181828" opacity=".7"/>
      <!-- mouth -->
      <rect id="crabMouth" x="4" y="4" width="2" height="1" fill="#a02818"/>
    </svg>
    <!-- pixel fish -->
    <svg id="pixelFish" style="position:absolute;bottom:10px;left:20%;opacity:0;image-rendering:pixelated;pointer-events:none" width="28" height="16" viewBox="0 0 7 4">
      <rect x="0" y="1" width="2" height="2" fill="#f09040"/>
      <rect x="2" y="0" width="4" height="4" fill="#f0a050"/>
      <rect x="5" y="1" width="2" height="2" fill="#f09040"/>
      <rect x="5" y="0" width="1" height="1" fill="#f8f8f8"/>
      <rect x="5" y="0" width="1" height="1" fill="#181828" opacity=".6"/>
    </svg>
  </div>
  <!-- bar -->
  <div style="position:absolute;bottom:8px;left:16px;right:16px;height:8px;z-index:10">
    <div style="position:absolute;inset:-2px;border:2px solid #444860"></div>
    <div style="position:absolute;inset:0;background:#0a0a18"></div>
    <div style="position:absolute;inset:0;overflow:hidden">
      <div id="tideFill" style="width:0%;height:100%;background:linear-gradient(90deg,#2880d0 0%,#2880d0 50%,#38a0e0 50%,#38a0e0 100%);background-size:8px 100%"></div>
    </div>
    <div class="pct" id="tidePct" style="left:0%">0%</div>
  </div>
</div>
</div>
</div>

<!-- ══ ROW 4: Day/Night + Apple ══ -->
<div class="row">

<!-- DAY/NIGHT CITY -->
<div class="sw">

<div class="scene" id="dnScene" style="width:440px;height:100px">
  <div class="scene-inner" id="dnBg" style="background:#5598d8">
    <div id="dnStarLayer" style="position:absolute;inset:0;pointer-events:none"></div>
    <!-- pixel sun -->
    <svg id="dnSunEl" style="position:absolute;top:8px;left:8%;image-rendering:pixelated;pointer-events:none;overflow:visible" width="24" height="24" viewBox="0 0 6 6">
      <rect x="2" y="0" width="2" height="1" fill="#f8d040"/><rect x="0" y="2" width="1" height="2" fill="#f8d040"/>
      <rect x="5" y="2" width="1" height="2" fill="#f8d040"/><rect x="2" y="5" width="2" height="1" fill="#f8d040"/>
      <rect x="1" y="1" width="4" height="4" fill="#f8d040"/><rect x="2" y="2" width="2" height="2" fill="#fff8a0"/>
    </svg>
    <!-- pixel moon -->
    <svg id="dnMoonEl" style="position:absolute;top:8px;right:10%;opacity:0;image-rendering:pixelated;pointer-events:none" width="20" height="20" viewBox="0 0 5 5">
      <rect x="1" y="0" width="3" height="1" fill="#f0e8b0"/><rect x="0" y="1" width="5" height="3" fill="#f0e8b0"/>
      <rect x="1" y="4" width="3" height="1" fill="#f0e8b0"/>
      <rect x="1" y="1" width="2" height="2" fill="#d8d090" opacity=".5"/>
    </svg>
    <!-- pixel clouds -->
    <svg id="dnCloud" style="position:absolute;top:10px;left:25%;image-rendering:pixelated;pointer-events:none" width="52" height="16" viewBox="0 0 13 4">
      <rect x="2" y="1" width="9" height="3" fill="rgba(255,255,255,.8)"/>
      <rect x="3" y="0" width="5" height="2" fill="rgba(255,255,255,.8)"/>
      <rect x="1" y="2" width="11" height="2" fill="rgba(255,255,255,.8)"/>
    </svg>
    <!-- pixel cityscape (silhouette) -->
    <svg style="position:absolute;bottom:0;left:0;width:100%;height:60px;image-rendering:pixelated;pointer-events:none" viewBox="0 0 110 15" preserveAspectRatio="none">
      <rect x="0" y="8" width="8" height="7" fill="#182030"/>
      <rect x="8" y="5" width="5" height="10" fill="#182030"/>
      <rect x="10" y="3" width="1" height="3" fill="#182030"/><!-- antenna -->
      <rect x="13" y="7" width="6" height="8" fill="#1a2235"/>
      <rect x="19" y="4" width="4" height="11" fill="#182030"/>
      <rect x="23" y="9" width="5" height="6" fill="#1a2235"/>
      <rect x="28" y="3" width="6" height="12" fill="#182030"/>
      <rect x="29" y="1" width="1" height="3" fill="#182030"/>
      <rect x="34" y="6" width="4" height="9" fill="#1a2235"/>
      <rect x="38" y="4" width="7" height="11" fill="#182030"/>
      <rect x="45" y="7" width="5" height="8" fill="#1a2235"/>
      <rect x="50" y="2" width="6" height="13" fill="#182030"/>
      <rect x="52" y="0" width="2" height="3" fill="#182030"/>
      <rect x="56" y="8" width="8" height="7" fill="#1a2235"/>
      <rect x="64" y="5" width="5" height="10" fill="#182030"/>
      <rect x="69" y="7" width="6" height="8" fill="#1a2235"/>
      <rect x="75" y="3" width="5" height="12" fill="#182030"/>
      <rect x="80" y="6" width="7" height="9" fill="#1a2235"/>
      <rect x="87" y="4" width="6" height="11" fill="#182030"/>
      <rect x="93" y="8" width="5" height="7" fill="#1a2235"/>
      <rect x="98" y="5" width="7" height="10" fill="#182030"/>
      <rect x="105" y="8" width="5" height="7" fill="#1a2235"/>
      <!-- windows day -->
      <g id="dnWinDay" fill="rgba(255,255,255,.2)">

<script>
/* ── shared ── */
let heartVal=0,energyVal=100;
const heartFill=document.getElementById('heartFill'),energyFill=document.getElementById('energyFill');
const heartChar=document.getElementById('heartChar'),boltChar=document.getElementById('boltChar');
const heartPct=document.getElementById('heartPct'),energyPct=document.getElementById('energyPct');
function rec(a=1){energyVal=Math.max(0,energyVal-0.32*a);heartVal=Math.min(100,heartVal+0.25*a);updateStats();}
function updateStats(){
  heartFill.style.width=heartVal+'%';energyFill.style.width=energyVal+'%';
  heartPct.textContent=Math.round(heartVal)+'%';heartPct.style.left=heartVal+'%';
  energyPct.textContent=Math.round(energyVal)+'%';energyPct.style.left=energyVal+'%';
  heartChar.style.left=`calc(${heartVal}% - 14px)`;boltChar.style.left=`calc(${energyVal}% - 12px)`;

const dominoTrack=document.getElementById('dominoTrack'),dominoFill=document.getElementById('dominoFill');
const dominoSvg=document.getElementById('dominoSvg'),dominoPctEl=document.getElementById('dominoPct');
let dominoVal=0;
function drawDoms(p){
  const W=dominoTrack.offsetWidth;dominoSvg.style.width=W+'px';
  const ND=20,sp=W/ND,fT=Math.floor(p*ND);
  let h='';
  for(let i=0;i<ND;i++){
    const cx=Math.round(i*sp+sp*.45);
    const dH=28+(i%2)*4; // 28 or 32px tall
    const dW=9;           // 9px wide – clearly visible
    const bY=60;
    const col=i%2===0?'#f8f0e8':'#2038b8';
    const dot=i%2===0?'#806010':'#101898';
    const shine='rgba(255,255,255,.35)';
    if(i<fT){
      // fallen: rotate flat, no opacity fade, full color
      const wobble=Math.min(88,55+(fT-i)*5);
      h+=`<g transform="translate(${cx},${bY}) rotate(${wobble})">`;
      h+=`<rect x="${-dW/2}" y="${-dH}" width="${dW}" height="${dH}" fill="${col}"/>`;
      h+=`<rect x="${-dW/2}" y="${-dH}" width="${dW}" height="3" fill="${dot}"/>`;
      h+=`<rect x="${-dW/2+1}" y="${-dH+4}" width="2" height="2" fill="${dot}" opacity=".8"/>`;
      h+=`<rect x="${dW/2-3}" y="${-dH+4}" width="2" height="2" fill="${dot}" opacity=".8"/>`;
      h+=`<rect x="${-dW/2+1}" y="${-dH/2-1}" width="2" height="2" fill="${dot}" opacity=".8"/>`;
      h+=`</g>`;
    } else {
      // standing upright
      h+=`<rect x="${cx-dW/2}" y="${bY-dH}" width="${dW}" height="${dH}" fill="${col}"/>`;
      h+=`<rect x="${cx-dW/2}" y="${bY-dH}" width="${dW}" height="3" fill="${dot}"/>`;
      // dots on face
      h+=`<rect x="${cx-2}" y="${bY-dH+5}" width="2" height="2" fill="${dot}"/>`;
      h+=`<rect x="${cx+1}" y="${bY-dH+5}" width="2" height="2" fill="${dot}"/>`;
      h+=`<rect x="${cx-2}" y="${bY-dH/2-1}" width="2" height="2" fill="${dot}"/>`;
      h+=`<rect x="${cx+1}" y="${bY-dH/2-1}" width="2" height="2" fill="${dot}"/>`;
      h+=`<rect x="${cx-1}" y="${bY-6}" width="2" height="2" fill="${dot}"/>`;
      // shine highlight
      h+=`<rect x="${cx-dW/2+1}" y="${bY-dH+1}" width="2" height="${Math.floor(dH/3)}" fill="${shine}"/>`;
    }
  }
  dominoSvg.innerHTML=h;
}

function drawSfStem(p){
  if(!sfStemCtx)return;
  const W=sfStemCanvas.width,H=sfStemCanvas.height;
  sfStemCtx.clearRect(0,0,W,H);
  if(p<.10)return;
  const stemH=Math.round(Math.min(1,(p-.10)/.60)*258); // match maxStemH
  // draw pixel stem from bottom up
  sfStemCtx.fillStyle='#4a8020';
  sfStemCtx.fillRect(W/2-2,H-stemH,4,stemH);
  // darker side
  sfStemCtx.fillStyle='#3a6018';
  sfStemCtx.fillRect(W/2+1,H-stemH,1,stemH);
  // leaf pair 1 at 30%
  if(p>.28){const lp=Math.min(1,(p-.28)/.15);const lh=H-Math.round(stemH*.25);const lw=Math.round(10*lp);
    sfStemCtx.fillStyle='#5aa028';sfStemCtx.fillRect(W/2-2-lw,lh-3,lw,5);// left leaf
    sfStemCtx.fillStyle='#6ab830';sfStemCtx.fillRect(W/2-2-lw,lh-2,lw,3);
    sfStemCtx.fillStyle='#5aa028';sfStemCtx.fillRect(W/2+2,lh-3,lw,5);// right leaf
    sfStemCtx.fillStyle='#6ab830';sfStemCtx.fillRect(W/2+2,lh-2,lw,3);}
  // leaf pair 2 at 50%
  if(p>.50){const lp=Math.min(1,(p-.50)/.15);const lh=H-Math.round(stemH*.55);const lw=Math.round(12*lp);
    sfStemCtx.fillStyle='#5aa028';sfStemCtx.fillRect(W/2-2-lw,lh-4,lw,6);
    sfStemCtx.fillStyle='#6ab830';sfStemCtx.fillRect(W/2-2-lw,lh-3,lw,4);
    sfStemCtx.fillStyle='#5aa028';sfStemCtx.fillRect(W/2+2,lh-4,lw,6);
    sfStemCtx.fillStyle='#6ab830';sfStemCtx.fillRect(W/2+2,lh-3,lw,4);}
  // leaf pair 3 at 70%
  if(p>.68){const lp=Math.min(1,(p-.68)/.12);const lh=H-Math.round(stemH*.82);const lw=Math.round(8*lp);
    sfStemCtx.fillStyle='#5aa028';sfStemCtx.fillRect(W/2-2-lw,lh-3,lw,5);
    sfStemCtx.fillStyle='#5aa028';sfStemCtx.fillRect(W/2+2,lh-3,lw,5);}
  // position stem wrap canvas
  const wrap=document.getElementById('sfStemWrap');
  if(wrap){wrap.style.bottom='40px';}
}

  // sky brightens with growth
  // Sky shifts from blue toward pale rose-pink as flower blooms
  const skyP=Math.max(0,(p-.5)/.5);

  rec(.35);
}

function paintStroke(target){

const stickyScene=document.getElementById('stickyScene');

const stickyDripLayer=document.getElementById('stickyDripLayer');
const qsSandPit=document.getElementById('qsSandPit'),qsVortexLayer=document.getElementById('qsVortexLayer');
const qsChest=document.getElementById('qsChest');
let stickyVal=0,stickyTarget=0,stickyVel=0,stickyDn=false,stickyT=0;

function spawnSandParticle(){const d=document.createElement('div');const sz=Math.floor(Math.random()*2+1)*4;
  const x=Math.round(25+Math.random()*50);
  // sand grains fly up then rain back down around pit
  d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:rgba(${Math.round(200+Math.random()*40)},${Math.round(160+Math.random()*30)},${Math.round(80+Math.random()*20)},.85);left:${x}%;bottom:${Math.round(20+Math.random()*15)}px;animation:pxFloat .6s steps(5,end) forwards;pointer-events:none;image-rendering:pixelated`;
  stickyDripLayer.appendChild(d);setTimeout(()=>d.remove(),700);}

function drawVortex(p){
  if(!qsVortexLayer)return;
  qsVortexLayer.innerHTML='';
  const W=stickyScene.offsetWidth,cx=W/2;
  // draw concentric sand ripple rings around sinking point
  for(let i=0;i<4;i++){
    const ring=document.createElement('div');
    const r=Math.round((8+i*10)*p);const opacity=Math.max(0,.6-i*.12);
    ring.style.cssText=`position:absolute;border:2px solid rgba(160,120,40,${opacity});border-radius:50%;width:${r*2}px;height:${Math.round(r*0.4)}px;left:${cx-r}px;bottom:${Math.round(20+stickyVal*40)}px;pointer-events:none;image-rendering:pixelated`;
    qsVortexLayer.appendChild(ring);
  }
}

(function stickyLoop(){
  stickyT++;
  // quicksand: drag LEFT = more sinking (sinkDepth = 1 - stickyVal)
  if(stickyDn){stickyVel+=(stickyTarget-stickyVal)*.016;stickyVel*=.80;}
  else{stickyVel*=.65;}
  stickyVal=clamp(stickyVal+stickyVel);
  const sp=Math.round(stickyVal*100);
  stickyFill.style.width=sp+'%';stickyPct.style.left=sp+'%';stickyPct.textContent=sp+'%';

  const sink=1-stickyVal; // 0=safe on right, 1=fully drowned on left

  // adventurer sinks into sand – clips upward as sink increases
  // Character position: tracks slider but also shifts toward center (pit) as sink increases
  const charX=Math.max(10,sp-sink*25);
  stickyKnob.style.left=`calc(${charX}% - 12px)`;
  stickyKnob.style.bottom=(24-Math.round(sink*14))+'px';
  // clip from bottom — legs bury first, then torso
  const clipPx=Math.round(sink*48);
  stickyKnob.style.clipPath=`inset(0 0 ${clipPx}px 0)`;

  // chest: more visible when sink is high (treasure revealed by disturbance)
  if(qsChest){qsChest.style.opacity=String(0.15+sink*.6);qsChest.style.bottom=(6-Math.round(sink*4))+'px';}

  // sand pit grows bigger as person sinks
  if(qsSandPit){qsSandPit.style.height=(30+sink*50)+'%';qsSandPit.style.left=(25-sink*10)+'%';qsSandPit.style.right=(25-sink*10)+'%';}

  // sky gets darker/more ominous as sink increases
  // desert sky stays warm but scene feels more ominous
  const r=Math.round(212-sink*40),g=Math.round(160-sink*30),b=Math.round(64-sink*30);
  stickyBg.style.background=`rgb(${r},${g},${b})`;
  const fR=Math.round(190-sink*80),fG=Math.round(130-sink*50);
  stickyFill.style.background=`linear-gradient(90deg,rgb(${fR},${fG},40) 0%,rgb(${fR},${fG},40) 50%,rgb(${fR+16},${fG+16},52) 50%,rgb(${fR+16},${fG+16},52) 100%)`;
  stickyFill.style.backgroundSize='8px 100%';

  if(stickyT%4===0)drawVortex(sink);
  if(stickyDn&&sink>.05&&Math.random()<.08)spawnSandParticle();
  requestAnimationFrame(stickyLoop);
})();
// start at right (safe, not sinking)

/* ══ PULSE (26) - heartbeat monitor ══ */
const pulseTrack=document.getElementById('pulseTrack');
const pulseFill=document.getElementById('pulseFill'),pulsePctEl=document.getElementById('pulsePct');
const pulseHeart=document.getElementById('pulseHeart');
const ecgCanvas=document.getElementById('ecgCanvas');
const ecgCtx=ecgCanvas.getContext('2d');ecgCtx.imageSmoothingEnabled=false;
let pulseVal=0,pulseTarget=0,pulseVel=0,pulseDn=false,pulseT=0,ecgX=0;
function drawECGTick(p){
  const W=ecgCanvas.width,H=ecgCanvas.height;
  const midY=H*.55;const heartRate=Math.round(60+p*120);const tickH=p*H*.35;
  const col=`rgb(${Math.round(220+p*35)},${Math.round(50+p*30)},${Math.round(80+p*20)})`;
  ecgCtx.strokeStyle=col;ecgCtx.lineWidth=2;
  if(ecgX>=W){ecgCtx.clearRect(0,0,W,H);ecgX=0;}
  // draw ECG spike
  ecgCtx.beginPath();ecgCtx.moveTo(ecgX,midY);
  ecgCtx.lineTo(ecgX+2,midY);ecgCtx.lineTo(ecgX+4,midY-tickH*.3);
  ecgCtx.lineTo(ecgX+6,midY+tickH*.2);ecgCtx.lineTo(ecgX+8,midY-tickH);
  ecgCtx.lineTo(ecgX+10,midY+tickH*.5);ecgCtx.lineTo(ecgX+12,midY);
  ecgCtx.lineTo(ecgX+16,midY);
  ecgCtx.stroke();ecgX+=4;}
(function pulseLoop(){
  pulseT++;
  if(pulseDn)pulseVel+=(pulseTarget-pulseVal)*.18;
  pulseVel+=Math.sin(pulseT*.08)*.01*pulseVal;// heartbeat wobble
  pulseVel*=.88;
  pulseVal=clamp(pulseVal+pulseVel);
  const pp=Math.round(pulseVal*100);
  pulseFill.style.height=pp+'%';pulsePctEl.textContent=pp+'%';
  // heart beats - scale pulses at rate
  const bpm=60+pulseVal*120;const beatPeriod=Math.round(60/(bpm)*60);
  const isBeat=pulseT%Math.max(beatPeriod,10)<3;
  const hScale=isBeat?(1.2+pulseVal*.3):1;
  pulseHeart.style.transform=`translateX(-50%) scale(${hScale})`;
  pulseHeart.style.filter=isBeat?`drop-shadow(0 0 ${4+pulseVal*8}px rgba(240,80,100,.8))`:'none';
  // ECG draws
  if(isBeat)drawECGTick(pulseVal);
  // background color
  pulseTrack.style.background=`linear-gradient(180deg,rgba(${Math.round(240+pulseVal*15)},${Math.round(50+pulseVal*30)},${Math.round(80+pulseVal*20)},.${Math.round(10+pulseVal*25)}),rgba(8,6,20,1))`;
  requestAnimationFrame(pulseLoop);
})();
bindSceneDrag(pulseTrack,p=>{pulseDn=true;pulseTarget=p;rec(.3);});
document.addEventListener('mouseup',()=>pulseDn=false);document.addEventListener('touchend',()=>pulseDn=false);

/* ══ DEEP SEA (27) ══ */
const fogTrack=document.getElementById('fogTrack');
const fogFill=document.getElementById('fogFill'),fogPctEl=document.getElementById('fogPct');
const fogLantern=document.getElementById('fogLantern'),fogGlow=document.getElementById('fogGlow');
const fogLayer1=document.getElementById('fogLayer1'),fogLayer2=document.getElementById('fogLayer2');
const fogPuffLayer=document.getElementById('fogPuffLayer'),fogGlowPanel=document.getElementById('fogGlowPanel');
let fogVal=0,fogTarget=0,fogVel=0,fogDn=false,fogT=0;

// pixel fish colours
const fishColors=['#f0a020','#e04040','#40d0e0','#e060c0','#60e060','#f8f040'];

function spawnDeepSeaParticle(p){
  // bioluminescent orb rising from depth, or tiny pixel fish

  const x=Math.round(rnd(8,88));const y=Math.round(rnd(fogTrack.offsetHeight*.4,fogTrack.offsetHeight*.85));

    el.innerHTML=`<svg width="16" height="8" viewBox="0 0 4 2" style="transform:scaleX(${dir})"><rect x="0" y="0" width="1" height="2" fill="${col}" opacity=".6"/><rect x="1" y="0" width="2" height="2" fill="${col}"/><rect x="3" y="0" width="1" height="2" fill="${col}" opacity=".5"/><rect x="3" y="0" width="1" height="1" fill="white" opacity=".4"/></svg>`;
    el.style.cssText=`position:absolute;left:${x}%;top:${y}px;pointer-events:none;image-rendering:pixelated;animation:pxFloat ${1.2+Math.random()*.8}s steps(6,end) forwards;opacity:.85`;
  } else {

(function fogLoop(){
  fogT++;
  if(fogDn)fogVel+=(fogTarget-fogVal)*.14;
  fogVel*=.88;
  fogVal=clamp(fogVal+fogVel);
  const fp=Math.round(fogVal*100);
  fogFill.style.height=fp+'%';fogPctEl.textContent=fp+'%';
  // fill is depth indicator (more fill = shallower/brighter)
  fogFill.style.background=`rgba(${Math.round(32+fogVal*40)},${Math.round(128+fogVal*80)},${Math.round(210+fogVal*45)},${0.5+fogVal*.4})`;
  // submarine dives deeper as value decreases (lower = deeper)
  const subY=Math.round(fogTrack.offsetHeight*(0.08+(1-fogVal)*0.65));
  fogLantern.style.top=subY+'px';
  // sonar ping radius pulses with depth charge
  const ping=fogT%45<5;const glowSz=Math.round(30+fogVal*60+(ping?20:0));
  fogGlow.style.width=glowSz+'px';fogGlow.style.height=glowSz+'px';
  fogGlow.style.top=(subY+12-glowSz/2)+'px';
  fogGlow.style.background=`radial-gradient(circle,rgba(${Math.round(64+fogVal*40)},${Math.round(192+fogVal*60)},255,${(0.1+fogVal*.2+(ping?.15:0)).toFixed(2)}),transparent 70%)`;
  // porthole glow flickers
  const flick=fogT%20<2;
  if(fogGlowPanel)fogGlowPanel.setAttribute('opacity',String(0.8+fogVal*.15+(flick?.1:0)));
  // water gets darker and more saturated at depth
  const rb=Math.round(10+fogVal*20),gb=Math.round(32+fogVal*58),bb=Math.round(80+fogVal*56);
  fogTrack.style.background=`rgb(${rb},${gb},${bb})`;
  // light rays dim with depth
  fogLayer2.style.opacity=String(Math.max(0,fogVal*.7));
  // depth overlay
  fogLayer1.style.opacity=String(Math.max(0,.6-fogVal*.5));
  // bioluminescent particles appear more at depth
  const spawnRate=0.04+Math.max(0,(1-fogVal))*.12;
  if(Math.random()<spawnRate)spawnDeepSeaParticle(fogVal);
  requestAnimationFrame(fogLoop);

/* ══ SPARK (28) - tesla coil ══ */
const sparkTrack=document.getElementById('sparkTrack');
const sparkFill=document.getElementById('sparkFill'),sparkPctEl=document.getElementById('sparkPct');
const sparkLayer=document.getElementById('sparkLayer');
const sparkCanvas=document.getElementById('sparkCanvas');
const sparkCtx=sparkCanvas.getContext('2d');sparkCtx.imageSmoothingEnabled=false;
let sparkVal=0,sparkTarget=0,sparkVel=0,sparkDn=false,sparkT=0;
function drawLightningBolt(p){
  sparkCtx.clearRect(0,0,sparkCanvas.width,sparkCanvas.height);
  if(p<.1)return;
  const W=sparkCanvas.width,H=sparkCanvas.height;
  const topX=W/2,topY=Math.round(H*.18);// top of coil sphere
  // random jagged path downward
  const steps=Math.round(4+p*6);const stepH=(H*.12)/steps;
  sparkCtx.strokeStyle=`rgba(${Math.round(140+p*115)},${Math.round(200+p*55)},255,${0.7+p*.3})`;
  sparkCtx.lineWidth=Math.ceil(p*3);
  sparkCtx.shadowColor='rgba(100,200,255,.8)';sparkCtx.shadowBlur=8;
  sparkCtx.beginPath();sparkCtx.moveTo(topX,topY);
  let cx=topX,cy=topY;
  for(let i=0;i<steps;i++){cx+=Math.round((Math.random()-.5)*W*.4);cy-=Math.round(stepH*(1+Math.random()*.5));cx=Math.max(8,Math.min(W-8,cx));cy=Math.max(4,cy);sparkCtx.lineTo(cx,cy);}
  sparkCtx.stroke();sparkCtx.shadowBlur=0;}
function spawnSparkParticle(){const x=Math.round(rnd(20,80));const y=Math.round(rnd(20,180));const s=document.createElement('div');const sz=Math.floor(Math.random()*2+1)*4;
  s.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:rgba(${Math.round(140+sparkVal*115)},${Math.round(200+sparkVal*55)},255,.9);box-shadow:0 0 4px rgba(100,200,255,.8);left:${x}%;top:${y}px;animation:pxTwinkle .3s steps(2,end) forwards;pointer-events:none;image-rendering:pixelated`;
  sparkLayer.appendChild(s);setTimeout(()=>s.remove(),400);}
(function sparkLoop(){
  sparkT++;
  if(sparkDn)sparkVel+=(sparkTarget-sparkVal)*.16;
  sparkVel*=.88;
  sparkVal=clamp(sparkVal+sparkVel);
  const sp=Math.round(sparkVal*100);
  sparkFill.style.height=sp+'%';sparkPctEl.textContent=sp+'%';
  // fill color: blue→white at high charge
  const r=Math.round(80+sparkVal*175),g=Math.round(180+sparkVal*75),b=255;
  sparkFill.style.background=`rgb(${r},${g},${b})`;
  sparkFill.style.filter=`drop-shadow(0 0 ${4+sparkVal*8}px rgba(100,200,255,.7))`;
  // draw lightning if charged enough
  if(sparkT%3===0&&sparkVal>.15)drawLightningBolt(sparkVal);
  // background darkens with charge
  sparkTrack.style.background=`rgb(${Math.round(5+sparkVal*10)},${Math.round(5+sparkVal*10)},${Math.round(16+sparkVal*20)})`;
  const spawnRate=Math.max(.02,sparkVal*.15);
  if(Math.random()<spawnRate)spawnSparkParticle();
  requestAnimationFrame(sparkLoop);
})();

/* ══ VOLCANO (29) ══ */
const dripTrack=document.getElementById('dripTrack');
const dripFill=document.getElementById('dripFill'),dripPctEl=document.getElementById('dripPct');
const dripBlobLayer=document.getElementById('dripBlobLayer'),dripHeatGlow=document.getElementById('dripHeatGlow');
const dripEruptLayer=document.getElementById('dripEruptLayer');
const dripLavaPool=document.getElementById('dripLavaPool');
const dripLavaLeft=document.getElementById('dripLavaLeft'),dripLavaRight=document.getElementById('dripLavaRight');
let dripVal=0,dripTarget=0,dripVel=0,dripDn=false,dripT=0;

function spawnLavaBomb(p){
  const el=document.createElement('div');
  // size scales with eruption power
  const sz=Math.floor(Math.random()*3+1)*4+(p>.7?4:0);
  const cols=['#ff2000','#ff5010','#ff7020','#ff9030','#ffb040','#ffcc20'];
  const col=cols[Math.floor(Math.random()*cols.length)];
  // spread gets wider as value increases
  const spread=Math.round(20+p*55);
  const ex=Math.round((Math.random()-.5)*2*spread);
  // height of arc increases too
  const ey=-Math.round(30+Math.random()*100*p+p*40);
  const craterY=Math.round(dripTrack.offsetHeight*0.36);
  const glow=Math.round(2+p*10);
  const dur=(0.25+Math.random()*0.4).toFixed(2);
  el.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${col};border-radius:50%;left:calc(50% + ${Math.round((Math.random()-.5)*20)}px);top:${craterY}px;animation:pxEmber ${dur}s steps(6,end) forwards;--ex:${ex}px;--ey:${ey}px;pointer-events:none;image-rendering:pixelated;box-shadow:0 0 ${glow}px ${col},0 0 ${glow*2}px rgba(255,100,0,.4)`;
  dripEruptLayer.appendChild(el);
  // also spawn a trail of smaller sparks
  if(p>.4){
    for(let i=0;i<2;i++){
      const spark=document.createElement('div');
      const ssz=4;
      spark.style.cssText=`position:absolute;width:${ssz}px;height:${ssz}px;background:#ff8030;left:calc(50% + ${Math.round((Math.random()-.5)*14)}px);top:${craterY}px;animation:pxEmber ${(parseFloat(dur)*0.6).toFixed(2)}s steps(4,end) forwards;--ex:${Math.round(ex*0.6)}px;--ey:${Math.round(ey*0.5)}px;pointer-events:none;image-rendering:pixelated`;
      dripEruptLayer.appendChild(spark);
      setTimeout(()=>spark.remove(),700);
    }
  }
  setTimeout(()=>el.remove(),900);
}

function spawnAshCloud(p){
  const el=document.createElement('div');
  const sz=Math.floor(Math.random()*4+2)*8;
  const gray=Math.round(40+Math.random()*30);
  el.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:rgba(${gray},${gray},${gray},0.4);border-radius:50%;left:${Math.round(20+Math.random()*60)}%;top:${Math.round(dripTrack.offsetHeight*0.1+Math.random()*dripTrack.offsetHeight*0.3)}px;animation:pxFloat ${1+Math.random()*0.8}s steps(6,end) forwards;pointer-events:none`;
  dripBlobLayer.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

(function dripLoop(){
  dripT++;
  // NO RESISTANCE going up — instant snap, no damping
  if(dripDn){
    dripVal=clamp(dripTarget); // direct set when dragging, no physics lag
  } else {
    dripVel*=.92; // gentle slide back when released
    dripVal=clamp(dripVal+dripVel);
  }
  const dp=Math.round(dripVal*100);
  dripFill.style.height=dp+'%';dripPctEl.textContent=dp+'%';
  
  // fill = magma meter — fierce red-orange glow
  const hue=Math.round(15-dripVal*12);
  const light=Math.round(38+dripVal*22);
  dripFill.style.background=`hsl(${hue},100%,${light}%)`;
  dripFill.style.filter=`drop-shadow(0 0 ${4+dripVal*14}px hsl(${hue},100%,60%))`;
  
  // sky darkens dramatically — deep red-black at full eruption
  const rBg=Math.round(18+dripVal*45),gBg=Math.round(8+dripVal*6),bBg=Math.round(8);
  dripHeatGlow.style.background=`linear-gradient(180deg,rgb(${rBg-8},${gBg},${bBg}),rgb(${rBg+16},${gBg+4},${bBg}))`;
  dripTrack.style.background=`rgb(${rBg},${gBg},${bBg})`;
  
  // lava pool in crater glows and pulses
  const craterPulse=0.5+Math.sin(dripT*0.15)*0.3;
  if(dripLavaPool){
    dripLavaPool.setAttribute('opacity',String(Math.min(1,dripVal*2.5)*craterPulse+0.1));
    dripLavaPool.setAttribute('fill',`hsl(${hue},100%,${Math.round(50+craterPulse*15)}%)`);
  }
  
  // lava flows: appear earlier and grow faster
  const flowH=Math.round(dripVal*dripTrack.offsetHeight*0.65);
  if(dripLavaLeft){dripLavaLeft.style.height=Math.round(dripVal>.2?(dripVal-.2)/.8*flowH:0)+'px';}
  if(dripLavaRight){dripLavaRight.style.height=Math.round(dripVal>.3?(dripVal-.3)/.7*flowH*0.85:0)+'px';}
  
  // MASSIVE eruption: multiple bombs per frame at high intensity
  const eruptRate=Math.max(0,dripVal-.05)*0.55;
  if(Math.random()<eruptRate){spawnLavaBomb(dripVal);}
  if(Math.random()<eruptRate*.7){spawnLavaBomb(dripVal);} // second bomb
  if(dripVal>.6&&Math.random()<eruptRate*.5){spawnLavaBomb(dripVal);} // third at high val
  if(dripVal>.2&&Math.random()<dripVal*.14)spawnAshCloud(dripVal);
  
  requestAnimationFrame(dripLoop);
})();
bindSceneDrag(dripTrack,p=>{dripDn=true;dripTarget=p;rec(.2);});
document.addEventListener('mouseup',()=>{dripDn=false;});document.addEventListener('touchend',()=>{dripDn=false;});

/* ── BACKGROUND ANIMATION ── */
(function(){
  const canvas=document.getElementById('bgCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  let W,H,stars=[];
  const PIXEL=4;

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=document.body.scrollHeight;
  }

  function initStars(){
    stars=[];
    const count=Math.round((W*H)/(4800));
    for(let i=0;i<count;i++){
      stars.push({
        x:Math.round(Math.random()*W/PIXEL)*PIXEL,
        y:Math.round(Math.random()*H/PIXEL)*PIXEL,
        size:Math.random()<.15?8:(Math.random()<.3?4:2),
        phase:Math.random()*Math.PI*2,
        speed:.006+Math.random()*.01,
        col:Math.random()<.5?[160,120,255]:(Math.random()<.5?[80,160,255]:[255,200,100]),
        drift:[(Math.random()-.5)*.3,(Math.random()-.5)*.15],
      });
    }
    // nebula blobs
    for(let i=0;i<18;i++){
      stars.push({
        nebula:true,
        x:Math.round(Math.random()*W/PIXEL)*PIXEL,
        y:Math.round(Math.random()*H/PIXEL)*PIXEL,
        size:Math.floor(Math.random()*8+4)*PIXEL,
        phase:Math.random()*Math.PI*2,
        speed:.003+Math.random()*.005,
        col:Math.random()<.5?[80,60,200]:[120,40,180],
        drift:[(Math.random()-.5)*.1,(Math.random()-.5)*.08],
      });
    }
  }

  let t=0;
  function draw(){
    t+=.016;
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      s.x+=s.drift[0];s.y+=s.drift[1];
      if(s.x<-s.size)s.x=W+s.size;if(s.x>W+s.size)s.x=-s.size;
      if(s.y<-s.size)s.y=H+s.size;if(s.y>H+s.size)s.y=-s.size;
      const pulse=Math.sin(t*s.speed*60+s.phase);
      if(s.nebula){
        const alpha=(.025+pulse*.012);
        ctx.fillStyle=`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${alpha})`;
        ctx.fillRect(Math.round(s.x/PIXEL)*PIXEL,Math.round(s.y/PIXEL)*PIXEL,s.size,s.size);
      } else {
        const alpha=(.25+pulse*.2);
        ctx.fillStyle=`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${alpha})`;
        const px=Math.round(s.x/PIXEL)*PIXEL,py=Math.round(s.y/PIXEL)*PIXEL;
        ctx.fillRect(px,py,s.size,s.size);
        if(s.size>=4&&pulse>.4){// cross twinkle
          ctx.fillStyle=`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${alpha*.5})`;
          ctx.fillRect(px-s.size,py,s.size,s.size);
          ctx.fillRect(px+s.size,py,s.size,s.size);
          ctx.fillRect(px,py-s.size,s.size,s.size);
          ctx.fillRect(px,py+s.size,s.size,s.size);
        }
      }
    }
    requestAnimationFrame(draw);
  }

  resize();initStars();draw();
  window.addEventListener('resize',()=>{resize();initStars();});
})();
</script>
</body>
</html>
